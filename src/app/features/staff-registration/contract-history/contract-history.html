<form class="form-card">
  <h2>Datos del Contrato</h2>

  <div class="form-content">

    <div class="contract-grid">

      <div class="field-card">
        <label>Instituto perteneciente</label>
        <select disabled>
          <option value="">Institución asignada automáticamente</option>
        </select>
      </div>

      <div class="field-card">
        <label>Tipo de personal</label>
        <select>
          <option value=""></option>
          <option>Docente</option>
          <option>Administrativo</option>
          <option>Directivo</option>
        </select>

        <label>Tipo de contratación docente</label>
        <select>
          <option value=""></option>
          <option>Base</option>
          <option>Otro</option>
        </select>

        <label>Si eligió otro especifique cuál</label>
        <input type="text" />
      </div>

      <div class="field-card">
        <label>Fecha de ingreso a la institución</label>
        <input type="date" />

        <label>Fecha de inicio del contrato vigente</label>
        <input type="date" />
      </div>

      <div class="field-card">
        <label>Área o departamento de adscripción</label>
        <select>
          <option value=""></option>
          <option>Dirección</option>
        </select>
      </div>

    </div>

  </div>
</form>
