<!-- Contenedor principal del módulo.
Organiza la vista en: Menú lateral - Contenido del formulario -->
<div class="page">

  <!-- Menú lateral del registro. Permite:
    - Navegar entre pasos
    - Mostrar progreso -->
  <aside
    class="sidebar"
    [class.sidebar-collapsed]="menuCollapsed">

    <!-- Cambia el estado del menú: expandido / colapsado. -->
    <button
      class="hamburger"
      type="button"
      (click)="toggleMenu()">
      ☰
    </button>

    <!-- Título del módulo. Se oculta cuando
    el menú está colapsado. -->
    <div
      class="sidebar-title"
      *ngIf="!menuCollapsed">

      Registro de <br />
      Personal de la DGES

    </div>

    <!-- Navegación entre formularios.
    Se habilita según el avance del usuario. -->
    <nav
      class="menu"
      *ngIf="!menuCollapsed">

      <a
        class="menu-item"
        routerLink="/home">
        Inicio
      </a>

      <!-- Regresa al concentrado de registros capturados. -->
      <a
        class="menu-item"
        routerLink="/staff-registration">
        Concentrado de Registros
      </a>

      <!-- Paso 1. Estados:
      active-actual completed-completado -->
      <a
        class="menu-item"
        [class.active]="currentStep === 1"
        [class.completed]="currentStep === 2"
        (click)="goToStep(1)">

        Registro Personal

      </a>

      <!-- Paso 2. Solo disponible cuando paso 1 termina. -->
      <a
        class="menu-item"
        [class.active]="currentStep === 2"
        [class.disabled]="!personalInformationCompleted"
        (click)="goToStep(2)">

        Historial de Contrato

      </a>

    </nav>

  </aside>

  <!-- Área principal del formulario. -->
  <main
    class="content"
    [class.content-expanded]="menuCollapsed">

    <section class="form-wrapper">

      <!-- Encabezado del flujo.
      Contiene:
      - Navegación
      - Stepper
      - Acciones -->
      <div class="top-actions">

        <button
          class="btn-nav"
          type="button"
          (click)="previousStep()">

          Atrás

        </button>

        <!-- Indicador visual del avance. -->
        <div class="steps">

          <div
            class="step"
            [class.active]="currentStep === 1"
            [class.completed]="currentStep === 2">

            <span>
              {{ currentStep === 2 ? '✓' : '1' }}
            </span>

            <p>
              Información Personal
            </p>

          </div>

          <!-- Línea visual entre pasos. -->
          <div
            class="step-line"
            [class.completed]="currentStep === 2">
          </div>

          <div
            class="step"
            [class.active]="currentStep === 2">

            <span>2</span>

            <p>
              Historial de Contrato
            </p>

          </div>

        </div>

        <!-- Botón del paso 1.
        Ejecuta nextStep(), que a su vez llama
        al método saveEmployee() del componente hijo. -->
        <button
          class="btn-nav"
          type="button"
          [disabled]="isSaving"
          (click)="nextStep()"
          *ngIf="currentStep === 1">

          {{ isSaving ? 'Guardando...' : 'Guardar' }}

        </button>

        <!-- Botón del paso 2.
        Ejecuta el guardado del historial contractual. -->
        <button
          class="btn-nav"
          type="button"
          (click)="saveContractHistory()"
          *ngIf="currentStep === 2">

          Guardar

        </button>

      </div>

      <!-- Mensaje central del formulario.
      Se utiliza para mostrar avisos de éxito o error
      controlados desde el componente padre. -->
      <div
        class="notification"
        [class.success]="notificationType === 'success'"
        [class.error]="notificationType === 'error'"
        *ngIf="notificationMessage">

        {{ notificationMessage }}

      </div>

      <!-- Paso 1. Captura la información personal. -->
      <app-personal-information
        *ngIf="currentStep === 1">
      </app-personal-information>

      <!-- Paso 2. Captura el historial de contrato.
      Recibe el id del empleado registrado en el paso 1. -->
      <app-contract-history
        #contractHistoryComponent
        *ngIf="currentStep === 2"
        [employeeId]="employeeId">
      </app-contract-history>

    </section>

  </main>

</div>
